<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meditation Timer</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131a2a;
    --surface2: #1a2338;
    --text: #e8edf5;
    --text-dim: #6b7a94;
    --accent: #4a90d9;
    --accent-glow: rgba(74, 144, 217, 0.25);
    --bell-gold: #c9a84c;
    --bell-glow: rgba(201, 168, 76, 0.3);
    --success: #3fb87e;
    --breathe-in: #4a90d9;
    --breathe-hold: #c9a84c;
    --breathe-out: #3fb87e;
    --radius: 14px;
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 12px) 20px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Header ──────────────────────────────────── */
  .header {
    width: 100%; max-width: 380px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 8px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 400; letter-spacing: 0.5px;
    color: var(--text);
  }
  .btn-back {
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 6px 0;
    text-decoration: none;
  }
  .btn-back:hover { color: var(--text); }

  /* ── Breathing Circle ────────────────────────── */
  .circle-wrap {
    position: relative;
    width: 220px; height: 220px;
    margin: 16px auto 8px;
    flex-shrink: 0;
  }
  .circle-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(74, 144, 217, 0.15);
  }
  .circle-inner {
    position: absolute;
    top: 50%; left: 50%;
    width: 60px; height: 60px;
    transform: translate(-50%, -50%) scale(1);
    border-radius: 50%;
    background: radial-gradient(circle, var(--breathe-in) 0%, rgba(74,144,217,0.1) 100%);
    box-shadow: 0 0 40px var(--accent-glow);
    transition: transform 0.3s ease, background 0.5s ease, box-shadow 0.5s ease;
  }
  .circle-inner.breathing {
    transition: none; /* JS controls animation */
  }
  .breath-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--text);
    opacity: 0.85;
    pointer-events: none;
    text-align: center;
    line-height: 1.3;
  }

  /* ── Time Display ────────────────────────────── */
  .time-display {
    text-align: center;
    margin: 8px 0 4px;
    flex-shrink: 0;
  }
  .time-remaining {
    font-family: var(--font-display);
    font-size: 48px; font-weight: 400;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .time-elapsed {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ── Controls ────────────────────────────────── */
  .controls { width: 100%; max-width: 380px; flex-shrink: 0; }
  .main-btn {
    display: block;
    width: 100%; max-width: 280px;
    margin: 10px auto;
    padding: 14px 0;
    border: none; border-radius: 40px;
    font-family: var(--font-body);
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .main-btn.start {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .main-btn.pause {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid rgba(74, 144, 217, 0.3);
  }
  .main-btn.resume {
    background: var(--success);
    color: #fff;
  }
  .main-btn:active { transform: scale(0.97); }
  .reset-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .reset-hint.visible { opacity: 1; }

  /* ── Settings Panel ──────────────────────────── */
  .settings {
    width: 100%; max-width: 380px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
  }
  .setting-group {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .setting-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Duration stepper */
  .stepper {
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .stepper-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(74, 144, 217, 0.3);
    background: var(--surface2);
    color: var(--accent);
    font-size: 20px; font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper-btn:active { background: var(--accent); color: #fff; }
  .stepper-val {
    font-family: var(--font-display);
    font-size: 28px;
    min-width: 80px; text-align: center;
  }

  /* Breathing mode selector */
  .breath-modes {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .breath-mode-btn {
    flex: 1; min-width: 80px;
    padding: 8px 6px;
    border-radius: 10px;
    border: 1px solid rgba(74, 144, 217, 0.15);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .breath-mode-btn.active {
    background: rgba(74, 144, 217, 0.15);
    border-color: var(--accent);
    color: var(--text);
  }
  .breath-mode-btn .mode-name { display: block; font-weight: 600; font-size: 13px; }
  .breath-mode-btn .mode-desc { display: block; font-size: 10px; margin-top: 2px; color: var(--text-dim); }

  /* Bell toggles */
  .bell-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .bell-row:last-child { border-bottom: none; }
  .bell-label { font-size: 14px; color: var(--text); }
  .toggle {
    width: 44px; height: 26px;
    border-radius: 13px;
    border: none;
    background: var(--surface2);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Weekly Total ────────────────────────────── */
  .weekly {
    width: 100%; max-width: 380px;
    text-align: center;
    padding: 8px 0;
    flex-shrink: 0;
  }
  .weekly-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .weekly-val {
    font-family: var(--font-display);
    font-size: 18px; color: var(--text);
    margin-top: 2px;
  }

  /* ── Running state hides settings ────────────── */
  body.running .settings { display: none; }
  body.running .circle-wrap { margin-top: 40px; width: 260px; height: 260px; }
  body.running .circle-outer { }
  body.running .time-remaining { font-size: 56px; }
  body.paused .main-btn.start { display: none; }
</style>
</head>
<body>

<div class="header">
  <a class="btn-back" href="../index.html">← Back</a>
  <h1>Meditation</h1>
  <div style="width:50px"></div>
</div>

<div class="circle-wrap" id="circleWrap">
  <div class="circle-outer"></div>
  <div class="circle-inner" id="circleInner"></div>
  <div class="breath-label" id="breathLabel"></div>
</div>

<div class="time-display">
  <div class="time-remaining" id="timeRemaining">20:00</div>
  <div class="time-elapsed" id="timeElapsed"></div>
</div>

<div class="controls">
  <button class="main-btn start" id="btnStart">Begin</button>
  <div class="reset-hint" id="resetHint">Long press to reset</div>
</div>

<div class="settings" id="settingsPanel">
  <!-- Duration -->
  <div class="setting-group">
    <div class="setting-label">Duration</div>
    <div class="stepper">
      <button class="stepper-btn" id="durDown">−</button>
      <div class="stepper-val" id="durVal">20 min</div>
      <button class="stepper-btn" id="durUp">+</button>
    </div>
  </div>

  <!-- Breathing Pattern -->
  <div class="setting-group">
    <div class="setting-label">Breathing Pattern</div>
    <div class="breath-modes" id="breathModes">
      <button class="breath-mode-btn active" data-mode="free">
        <span class="mode-name">Free</span>
        <span class="mode-desc">4s in · 4s out</span>
      </button>
      <button class="breath-mode-btn" data-mode="478">
        <span class="mode-name">4-7-8</span>
        <span class="mode-desc">4s in · 7s hold · 8s out</span>
      </button>
      <button class="breath-mode-btn" data-mode="box">
        <span class="mode-name">Box</span>
        <span class="mode-desc">4s each × 4</span>
      </button>
    </div>
  </div>

  <!-- Interval Bells -->
  <div class="setting-group">
    <div class="setting-label">Interval Bells</div>
    <div id="bellToggles"></div>
  </div>
</div>

<div class="weekly">
  <div class="weekly-label">This week</div>
  <div class="weekly-val" id="weeklyVal">0 min</div>
</div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  duration: 20,      // minutes
  breathMode: 'free', // 'free' | '478' | 'box'
  bells: { 5: true, 10: true, 15: true },
  running: false,
  paused: false,
  startTime: null,    // Date.now() when started
  pauseOffset: 0,     // accumulated paused time in ms
  pauseStart: null,   // Date.now() when paused
  elapsed: 0,         // seconds elapsed (active time only)
};

// ════════════════════════════════════════
// AUDIO — DND-resilient bell system
// ════════════════════════════════════════
// Strategy: We use the Web Audio API for bell synthesis,
// but also maintain a silent <audio> element loop to keep
// the iOS audio session alive when the screen locks or
// DND is on. Media playback is NOT muted by DND — only
// notification-category sounds are.

let audioCtx = null;
let silentAudio = null;
let silentInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Create a silent audio element that loops — this keeps
  // the audio session classified as "media playback" on iOS,
  // which prevents DND and screen lock from muting us.
  // We generate a tiny WAV with near-silence.
  silentAudio = document.createElement('audio');
  silentAudio.setAttribute('playsinline', '');
  silentAudio.setAttribute('webkit-playsinline', '');
  silentAudio.loop = true;

  // 1-second mono WAV at 8kHz, amplitude ~1 (near-silent but nonzero)
  const wavHeader = new ArrayBuffer(44 + 8000);
  const view = new DataView(wavHeader);
  // RIFF header
  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + 8000, true);
  writeStr(view, 8, 'WAVE');
  // fmt chunk
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, 1, true); // mono
  view.setUint32(24, 8000, true); // sample rate
  view.setUint32(28, 8000, true); // byte rate
  view.setUint16(32, 1, true); // block align
  view.setUint16(34, 8, true); // bits per sample
  // data chunk
  writeStr(view, 36, 'data');
  view.setUint32(40, 8000, true);
  // Fill with near-silent samples (128 = silence for 8-bit unsigned PCM)
  const bytes = new Uint8Array(wavHeader);
  for (let i = 44; i < 44 + 8000; i++) bytes[i] = 128;
  // Make one sample slightly off-silence so iOS doesn't optimize it away
  bytes[44] = 129;

  const blob = new Blob([wavHeader], { type: 'audio/wav' });
  silentAudio.src = URL.createObjectURL(blob);
}

function writeStr(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

function startSilentLoop() {
  if (!silentAudio) return;
  silentAudio.play().catch(() => {});
  // Also periodically poke the audio context to prevent suspension
  silentInterval = setInterval(() => {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
    // Re-trigger silent audio if it stopped
    if (silentAudio.paused) {
      silentAudio.play().catch(() => {});
    }
  }, 3000);
}

function stopSilentLoop() {
  if (silentAudio) silentAudio.pause();
  if (silentInterval) clearInterval(silentInterval);
  silentInterval = null;
}

function playBell(type) {
  // type: 'interval' | 'end'
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;
  const isEnd = type === 'end';
  const count = isEnd ? 3 : 1;

  for (let i = 0; i < count; i++) {
    const t = now + i * 1.2;
    // Singing bowl simulation
    const freqs = isEnd ? [528, 396, 264] : [528, 396];
    freqs.forEach((freq, fi) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15 / (fi + 1), t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 2.5);
    });
  }

  // Also play via HTML5 Audio as a fallback for backgrounded state
  playBellFallback(type);
}

function playBellFallback(type) {
  // Generate a short bell-like tone as a WAV and play it through <audio>
  // This serves as a backup path that works even if Web Audio is suspended
  const sampleRate = 22050;
  const duration = type === 'end' ? 4 : 2.5;
  const numSamples = Math.floor(sampleRate * duration);

  const buffer = new ArrayBuffer(44 + numSamples * 2);
  const view = new DataView(buffer);
  // WAV header - 16-bit mono
  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + numSamples * 2, true);
  writeStr(view, 8, 'WAVE');
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(view, 36, 'data');
  view.setUint32(40, numSamples * 2, true);

  // Synthesize bell sound
  const bellCount = type === 'end' ? 3 : 1;
  for (let i = 0; i < numSamples; i++) {
    const t = i / sampleRate;
    let sample = 0;
    for (let b = 0; b < bellCount; b++) {
      const offset = b * 1.2;
      const bt = t - offset;
      if (bt < 0) continue;
      const env = Math.exp(-bt * 1.8) * 0.3;
      sample += Math.sin(2 * Math.PI * 528 * bt) * env;
      sample += Math.sin(2 * Math.PI * 396 * bt) * env * 0.5;
    }
    sample = Math.max(-1, Math.min(1, sample));
    view.setInt16(44 + i * 2, sample * 16000, true);
  }

  const blob = new Blob([buffer], { type: 'audio/wav' });
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play().catch(() => {});
}

// ════════════════════════════════════════
// BREATHING PATTERNS
// ════════════════════════════════════════
const PATTERNS = {
  free: { phases: [
    { name: 'Inhale', duration: 4, color: 'var(--breathe-in)', scale: 2.8 },
    { name: 'Exhale', duration: 4, color: 'var(--breathe-out)', scale: 1 },
  ]},
  '478': { phases: [
    { name: 'Inhale', duration: 4, color: 'var(--breathe-in)', scale: 2.8 },
    { name: 'Hold',   duration: 7, color: 'var(--breathe-hold)', scale: 2.8 },
    { name: 'Exhale', duration: 8, color: 'var(--breathe-out)', scale: 1 },
  ]},
  box: { phases: [
    { name: 'Inhale', duration: 4, color: 'var(--breathe-in)', scale: 2.8 },
    { name: 'Hold',   duration: 4, color: 'var(--breathe-hold)', scale: 2.8 },
    { name: 'Exhale', duration: 4, color: 'var(--breathe-out)', scale: 1 },
    { name: 'Hold',   duration: 4, color: 'var(--breathe-hold)', scale: 1 },
  ]},
};

let breathAnimFrame = null;
let breathStartTime = 0;

function getBreathState(elapsed) {
  const pattern = PATTERNS[S.breathMode];
  const totalCycle = pattern.phases.reduce((s, p) => s + p.duration, 0);
  const pos = elapsed % totalCycle;
  let cumulative = 0;
  for (const phase of pattern.phases) {
    if (pos < cumulative + phase.duration) {
      const phaseElapsed = pos - cumulative;
      const progress = phaseElapsed / phase.duration;
      return { phase, progress, phaseElapsed };
    }
    cumulative += phase.duration;
  }
  return { phase: pattern.phases[0], progress: 0, phaseElapsed: 0 };
}

function animateBreathing() {
  if (!S.running || S.paused) return;

  const now = performance.now() / 1000;
  const elapsed = now - breathStartTime;
  const { phase, progress } = getBreathState(elapsed);

  const circle = document.getElementById('circleInner');
  const label = document.getElementById('breathLabel');

  // Calculate scale based on phase type
  let scale;
  const prevPhaseIndex = PATTERNS[S.breathMode].phases.indexOf(phase);
  const prevPhase = PATTERNS[S.breathMode].phases[(prevPhaseIndex - 1 + PATTERNS[S.breathMode].phases.length) % PATTERNS[S.breathMode].phases.length];

  if (phase.name === 'Inhale') {
    scale = 1 + (2.8 - 1) * easeInOutSine(progress);
  } else if (phase.name === 'Exhale') {
    scale = 2.8 - (2.8 - 1) * easeInOutSine(progress);
  } else {
    // Hold — maintain the scale from end of previous phase
    scale = phase.scale;
  }

  circle.style.transform = `translate(-50%, -50%) scale(${scale})`;
  circle.style.background = `radial-gradient(circle, ${phase.color} 0%, rgba(74,144,217,0.05) 100%)`;

  // Countdown within phase
  const remaining = Math.ceil(phase.duration - (progress * phase.duration));
  label.textContent = `${phase.name}\n${remaining}`;

  breathAnimFrame = requestAnimationFrame(animateBreathing);
}

function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

function startBreathing() {
  breathStartTime = performance.now() / 1000;
  document.getElementById('circleInner').classList.add('breathing');
  animateBreathing();
}

function stopBreathing() {
  if (breathAnimFrame) cancelAnimationFrame(breathAnimFrame);
  breathAnimFrame = null;
  const circle = document.getElementById('circleInner');
  circle.classList.remove('breathing');
  circle.style.transform = 'translate(-50%, -50%) scale(1)';
  circle.style.background = '';
  document.getElementById('breathLabel').textContent = '';
}

// ════════════════════════════════════════
// TIMER ENGINE
// ════════════════════════════════════════
let tickInterval = null;
let bellsFired = new Set();

function fmtTime(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getActiveElapsed() {
  if (!S.startTime) return 0;
  const now = Date.now();
  const pauseTime = S.paused ? (now - S.pauseStart) : 0;
  return Math.floor((now - S.startTime - S.pauseOffset - pauseTime) / 1000);
}

function tick() {
  if (!S.running || S.paused) return;

  const elapsed = getActiveElapsed();
  S.elapsed = elapsed;
  const totalSec = S.duration * 60;
  const remaining = Math.max(0, totalSec - elapsed);

  document.getElementById('timeRemaining').textContent = fmtTime(remaining);
  document.getElementById('timeElapsed').textContent = `${fmtTime(elapsed)} elapsed`;

  // Check interval bells
  const elapsedMin = Math.floor(elapsed / 60);
  for (const [min, enabled] of Object.entries(S.bells)) {
    const m = parseInt(min);
    if (enabled && elapsedMin >= m && elapsed >= m * 60 && !bellsFired.has(m)) {
      // Only fire if we're within 2 seconds of the mark (avoid double-fire)
      if (elapsed - m * 60 < 2) {
        bellsFired.add(m);
        playBell('interval');
      } else {
        bellsFired.add(m); // Mark as fired even if we're past it
      }
    }
  }

  // Session complete
  if (remaining <= 0) {
    completeSession();
  }
}

function startTimer() {
  initAudio();
  startSilentLoop();

  S.running = true;
  S.paused = false;
  S.startTime = Date.now();
  S.pauseOffset = 0;
  S.pauseStart = null;
  S.elapsed = 0;
  bellsFired.clear();

  document.body.classList.add('running');
  document.body.classList.remove('paused');

  // Play start bell
  playBell('interval');

  // Keep screen awake if possible
  requestWakeLock();

  // Use a tight interval — we rely on Date.now() for accuracy, not the interval precision
  tickInterval = setInterval(tick, 250);
  tick();
  startBreathing();
  updateButton();
}

function pauseTimer() {
  S.paused = true;
  S.pauseStart = Date.now();
  document.body.classList.add('paused');
  if (breathAnimFrame) cancelAnimationFrame(breathAnimFrame);
  breathAnimFrame = null;
  updateButton();
}

function resumeTimer() {
  S.pauseOffset += Date.now() - S.pauseStart;
  S.paused = false;
  S.pauseStart = null;
  document.body.classList.remove('paused');
  breathStartTime = performance.now() / 1000; // Reset breath cycle on resume
  animateBreathing();
  updateButton();
}

function resetTimer() {
  S.running = false;
  S.paused = false;
  S.startTime = null;
  S.pauseOffset = 0;
  S.pauseStart = null;
  S.elapsed = 0;
  bellsFired.clear();

  if (tickInterval) clearInterval(tickInterval);
  tickInterval = null;
  stopBreathing();
  stopSilentLoop();
  releaseWakeLock();

  document.body.classList.remove('running', 'paused');
  document.getElementById('timeRemaining').textContent = fmtTime(S.duration * 60);
  document.getElementById('timeElapsed').textContent = '';
  document.getElementById('resetHint').classList.remove('visible');
  updateButton();
}

function completeSession() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = null;

  playBell('end');

  // Log session
  const sessions = JSON.parse(localStorage.getItem('med_sessions') || '[]');
  sessions.push({ date: new Date().toISOString(), duration: S.duration, elapsed: S.elapsed });
  localStorage.setItem('med_sessions', JSON.stringify(sessions));

  // Brief delay then reset
  setTimeout(() => {
    // Vibrate if available
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    stopBreathing();
    stopSilentLoop();
    releaseWakeLock();

    S.running = false;
    S.paused = false;
    document.body.classList.remove('running', 'paused');

    document.getElementById('timeRemaining').textContent = 'Done';
    document.getElementById('timeElapsed').textContent = `${fmtTime(S.elapsed)} completed`;

    updateWeekly();
    updateButton();

    // Reset display after 5 seconds
    setTimeout(() => {
      document.getElementById('timeRemaining').textContent = fmtTime(S.duration * 60);
      document.getElementById('timeElapsed').textContent = '';
    }, 5000);
  }, 500);
}

function updateButton() {
  const btn = document.getElementById('btnStart');
  const hint = document.getElementById('resetHint');

  if (!S.running) {
    btn.textContent = 'Begin';
    btn.className = 'main-btn start';
    hint.classList.remove('visible');
  } else if (S.paused) {
    btn.textContent = 'Resume';
    btn.className = 'main-btn resume';
    hint.classList.add('visible');
  } else {
    btn.textContent = 'Pause';
    btn.className = 'main-btn pause';
    hint.classList.add('visible');
  }
}

// ════════════════════════════════════════
// WAKE LOCK (keep screen on)
// ════════════════════════════════════════
let wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); }
    catch (e) { /* silently fail */ }
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && S.running && !S.paused) {
    requestWakeLock();
    // Also poke audio context
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
  }
});

// ════════════════════════════════════════
// UI SETUP
// ════════════════════════════════════════

// Duration stepper
function updateDuration(delta) {
  S.duration = Math.max(5, Math.min(60, S.duration + delta));
  document.getElementById('durVal').textContent = S.duration + ' min';
  document.getElementById('timeRemaining').textContent = fmtTime(S.duration * 60);
  savePref();
  renderBells();
}

document.getElementById('durUp').addEventListener('click', () => updateDuration(5));
document.getElementById('durDown').addEventListener('click', () => updateDuration(-5));

// Breathing mode buttons
document.getElementById('breathModes').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-mode]');
  if (!btn) return;
  S.breathMode = btn.dataset.mode;
  document.querySelectorAll('.breath-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === S.breathMode));
  savePref();
});

// Main button — tap to start/pause/resume
const btnStart = document.getElementById('btnStart');

btnStart.addEventListener('click', () => {
  if (!S.running) {
    startTimer();
  } else if (S.paused) {
    resumeTimer();
  } else {
    pauseTimer();
  }
});

// Long press to reset
let longPressTimer = null;
btnStart.addEventListener('touchstart', (e) => {
  if (!S.running) return;
  longPressTimer = setTimeout(() => {
    resetTimer();
    // Visual feedback
    if (navigator.vibrate) navigator.vibrate(50);
  }, 800);
}, { passive: true });
btnStart.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
btnStart.addEventListener('touchcancel', () => { clearTimeout(longPressTimer); });
// Mouse fallback
btnStart.addEventListener('mousedown', () => {
  if (!S.running) return;
  longPressTimer = setTimeout(() => { resetTimer(); }, 800);
});
btnStart.addEventListener('mouseup', () => { clearTimeout(longPressTimer); });
btnStart.addEventListener('mouseleave', () => { clearTimeout(longPressTimer); });

// Bell toggles
function renderBells() {
  const container = document.getElementById('bellToggles');
  container.innerHTML = '';

  // Generate bell marks: every 5 minutes that falls within the session
  const marks = [];
  for (let m = 5; m < S.duration; m += 5) {
    marks.push(m);
  }

  if (marks.length === 0) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px 0">Session too short for interval bells</div>';
    return;
  }

  marks.forEach(m => {
    if (!(m in S.bells)) S.bells[m] = true;
    const row = document.createElement('div');
    row.className = 'bell-row';
    row.innerHTML = `
      <span class="bell-label">${m} min</span>
      <button class="toggle ${S.bells[m] ? 'on' : ''}" data-bell="${m}"></button>
    `;
    row.querySelector('.toggle').addEventListener('click', function() {
      S.bells[m] = !S.bells[m];
      this.classList.toggle('on', S.bells[m]);
      savePref();
    });
    container.appendChild(row);
  });
}

// Weekly total
function updateWeekly() {
  const sessions = JSON.parse(localStorage.getItem('med_sessions') || '[]');
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);

  const weekMin = sessions
    .filter(s => new Date(s.date) >= startOfWeek)
    .reduce((sum, s) => sum + (s.elapsed || s.duration * 60), 0);

  const totalMin = Math.round(weekMin / 60);
  document.getElementById('weeklyVal').textContent = totalMin + ' min';
}

// Preferences persistence
function savePref() {
  localStorage.setItem('med_pref', JSON.stringify({
    duration: S.duration,
    breathMode: S.breathMode,
    bells: S.bells,
  }));
}

function loadPref() {
  try {
    const p = JSON.parse(localStorage.getItem('med_pref'));
    if (p) {
      S.duration = p.duration || 20;
      S.breathMode = p.breathMode || 'free';
      if (p.bells) S.bells = p.bells;
    }
  } catch (e) {}
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
loadPref();
document.getElementById('durVal').textContent = S.duration + ' min';
document.getElementById('timeRemaining').textContent = fmtTime(S.duration * 60);
document.querySelectorAll('.breath-mode-btn').forEach(b =>
  b.classList.toggle('active', b.dataset.mode === S.breathMode)
);
renderBells();
updateWeekly();
</script>
