<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meditation Timer</title>
<style>
  :root {
    --bg: #12110f;
    --surface: #1e1c18;
    --surface2: #2a2720;
    --text: #e8e2d6;
    --text-dim: #8a7f6e;
    --accent: #b08f5a;
    --accent-glow: rgba(176, 143, 90, 0.2);
    --success: #6a9e6e;
    --breathe-in: #b08f5a;
    --breathe-hold: #c4a265;
    --breathe-out: #6a9e6e;
    --radius: 14px;
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 8px) 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  .header {
    width: 100%; max-width: 380px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 400; letter-spacing: 0.5px;
  }
  .btn-back {
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 6px 0;
    text-decoration: none;
  }

  .circle-wrap {
    position: relative;
    width: 190px; height: 190px;
    margin: 10px auto 4px;
    flex-shrink: 0;
  }
  .circle-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(176, 143, 90, 0.15);
  }
  .circle-inner {
    position: absolute;
    top: 50%; left: 50%;
    width: 55px; height: 55px;
    transform: translate(-50%, -50%) scale(1);
    border-radius: 50%;
    background: radial-gradient(circle, var(--breathe-in) 0%, rgba(176,143,90,0.08) 100%);
    box-shadow: 0 0 40px var(--accent-glow);
    transition: transform 0.3s ease, background 0.5s ease;
  }
  .circle-inner.breathing { transition: none; }
  .breath-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--text);
    opacity: 0.85;
    pointer-events: none;
    text-align: center;
    line-height: 1.3;
    white-space: pre;
  }

  .time-display { text-align: center; margin: 4px 0 2px; flex-shrink: 0; }
  .time-remaining {
    font-family: var(--font-display);
    font-size: 44px; font-weight: 400;
    letter-spacing: 2px; line-height: 1;
  }
  .time-elapsed { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .controls { width: 100%; max-width: 380px; flex-shrink: 0; }
  .main-btn {
    display: block;
    width: 100%; max-width: 260px;
    margin: 8px auto;
    padding: 12px 0;
    border: none; border-radius: 40px;
    font-family: var(--font-body);
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .main-btn.start { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
  .main-btn.pause { background: var(--surface2); color: var(--text); border: 1px solid rgba(176,143,90,0.3); }
  .main-btn.resume { background: var(--success); color: #fff; }
  .main-btn:active { transform: scale(0.97); }
  .reset-hint {
    text-align: center; font-size: 11px; color: var(--text-dim);
    margin-top: 1px; opacity: 0; transition: opacity 0.3s;
  }
  .reset-hint.visible { opacity: 1; }

  .settings {
    width: 100%; max-width: 380px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .setting-group {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .setting-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stepper { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .stepper-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(176,143,90,0.3);
    background: var(--surface2);
    color: var(--accent);
    font-size: 18px; font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper-btn:active { background: var(--accent); color: #fff; }
  .stepper-val {
    font-family: var(--font-display);
    font-size: 24px;
    min-width: 70px; text-align: center;
  }

  .breath-steppers { display: flex; gap: 10px; margin-top: 8px; }
  .breath-stepper {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .breath-stepper-label { font-size: 12px; color: var(--text-dim); min-width: 30px; }
  .breath-stepper-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(176,143,90,0.2);
    background: var(--surface2);
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .breath-stepper-btn:active { background: var(--accent); color: #fff; }
  .breath-stepper-val { font-family: var(--font-display); font-size: 16px; min-width: 24px; text-align: center; }

  .breath-modes { display: flex; gap: 5px; }
  .breath-mode-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: 10px;
    border: 1px solid rgba(176,143,90,0.15);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.2;
  }
  .breath-mode-btn.active {
    background: rgba(176,143,90,0.12);
    border-color: var(--accent);
    color: var(--text);
  }
  .breath-mode-btn .mode-name { display: block; font-weight: 600; font-size: 13px; }
  .breath-mode-btn .mode-desc { display: block; font-size: 10px; margin-top: 1px; }

  .bell-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .bell-row:last-child { border-bottom: none; }
  .bell-label { font-size: 14px; }
  .toggle {
    width: 42px; height: 24px;
    border-radius: 12px; border: none;
    background: var(--surface2);
    position: relative; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  .weekly {
    width: 100%; max-width: 380px;
    text-align: center;
    padding: 6px 0;
    flex-shrink: 0;
  }
  .weekly-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .weekly-val { font-family: var(--font-display); font-size: 17px; margin-top: 1px; }

  body.running .settings { display: none; }
  body.running .circle-wrap { margin-top: 30px; width: 240px; height: 240px; }
  body.running .time-remaining { font-size: 52px; }
  body.paused .main-btn.start { display: none; }
</style>
</head>
<body>

<div class="header">
  <a class="btn-back" href="../index.html">&larr; Back</a>
  <h1>Meditation</h1>
  <div style="width:50px"></div>
</div>

<div class="circle-wrap" id="circleWrap">
  <div class="circle-outer"></div>
  <div class="circle-inner" id="circleInner"></div>
  <div class="breath-label" id="breathLabel"></div>
</div>

<div class="time-display">
  <div class="time-remaining" id="timeRemaining">20:00</div>
  <div class="time-elapsed" id="timeElapsed"></div>
</div>

<div class="controls">
  <button class="main-btn start" id="btnStart">Begin</button>
  <div class="reset-hint" id="resetHint">Long press to reset</div>
</div>

<div class="settings" id="settingsPanel">
  <div class="setting-group">
    <div class="setting-label">Duration</div>
    <div class="stepper">
      <button class="stepper-btn" id="durDown">&minus;</button>
      <div class="stepper-val" id="durVal">20 min</div>
      <button class="stepper-btn" id="durUp">+</button>
    </div>
  </div>

  <div class="setting-group">
    <div class="setting-label">Breathing</div>
    <div class="breath-modes" id="breathModes">
      <button class="breath-mode-btn active" data-mode="free">
        <span class="mode-name">Free</span>
        <span class="mode-desc">adjustable</span>
      </button>
      <button class="breath-mode-btn" data-mode="478">
        <span class="mode-name">4-7-8</span>
        <span class="mode-desc">in&middot;hold&middot;out</span>
      </button>
      <button class="breath-mode-btn" data-mode="box">
        <span class="mode-name">Box</span>
        <span class="mode-desc">4&times;4s</span>
      </button>
    </div>
    <div class="breath-steppers" id="breathSteppers">
      <div class="breath-stepper">
        <span class="breath-stepper-label">In</span>
        <button class="breath-stepper-btn" data-target="inhale" data-dir="-1">&minus;</button>
        <span class="breath-stepper-val" id="inhaleVal">4s</span>
        <button class="breath-stepper-btn" data-target="inhale" data-dir="1">+</button>
      </div>
      <div class="breath-stepper">
        <span class="breath-stepper-label">Out</span>
        <button class="breath-stepper-btn" data-target="exhale" data-dir="-1">&minus;</button>
        <span class="breath-stepper-val" id="exhaleVal">4s</span>
        <button class="breath-stepper-btn" data-target="exhale" data-dir="1">+</button>
      </div>
    </div>
  </div>

  <div class="setting-group">
    <div class="setting-label">Interval Bells</div>
    <div id="bellToggles"></div>
  </div>
</div>

<div class="weekly">
  <div class="weekly-label">This week</div>
  <div class="weekly-val" id="weeklyVal">0 min</div>
</div>

<script>
const S = {
  duration: 20,
  breathMode: 'free',
  freeInhale: 4,
  freeExhale: 4,
  bells: { 5: true, 10: true, 15: true },
  running: false,
  paused: false,
  startTime: null,
  pauseOffset: 0,
  pauseStart: null,
  elapsed: 0,
};

/* ── Audio ─────────────────────────────────────── */
let audioCtx = null;
let silentAudio = null;
let silentInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  silentAudio = document.createElement('audio');
  silentAudio.setAttribute('playsinline', '');
  silentAudio.setAttribute('webkit-playsinline', '');
  silentAudio.loop = true;

  const buf = new ArrayBuffer(44 + 8000);
  const v = new DataView(buf);
  wStr(v,0,'RIFF'); v.setUint32(4,36+8000,true); wStr(v,8,'WAVE');
  wStr(v,12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,8000,true); v.setUint32(28,8000,true);
  v.setUint16(32,1,true); v.setUint16(34,8,true);
  wStr(v,36,'data'); v.setUint32(40,8000,true);
  const b = new Uint8Array(buf);
  for (let i=44;i<44+8000;i++) b[i]=128;
  b[44]=129;
  silentAudio.src = URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

function wStr(v,o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}

function startSilentLoop() {
  if (!silentAudio) return;
  silentAudio.play().catch(()=>{});
  silentInterval = setInterval(()=>{
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
    if(silentAudio.paused) silentAudio.play().catch(()=>{});
  },3000);
}

function stopSilentLoop() {
  if(silentAudio)silentAudio.pause();
  if(silentInterval)clearInterval(silentInterval);
  silentInterval=null;
}

function playBell(type) {
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const now=audioCtx.currentTime;
  const count=type==='end'?3:1;
  for(let i=0;i<count;i++){
    const t=now+i*1.2;
    [528,396].forEach((freq,fi)=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.15/(fi+1),t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,t+2.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t+2.5);
    });
  }
  playBellFallback(type);
}

function playBellFallback(type) {
  const sr=22050, dur=type==='end'?4:2.5;
  const n=Math.floor(sr*dur);
  const buf=new ArrayBuffer(44+n*2);
  const v=new DataView(buf);
  wStr(v,0,'RIFF'); v.setUint32(4,36+n*2,true); wStr(v,8,'WAVE');
  wStr(v,12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  wStr(v,36,'data'); v.setUint32(40,n*2,true);
  const bc=type==='end'?3:1;
  for(let i=0;i<n;i++){
    const t=i/sr; let s=0;
    for(let b=0;b<bc;b++){
      const bt=t-b*1.2; if(bt<0)continue;
      const e=Math.exp(-bt*1.8)*0.3;
      s+=Math.sin(2*Math.PI*528*bt)*e;
      s+=Math.sin(2*Math.PI*396*bt)*e*0.5;
    }
    s=Math.max(-1,Math.min(1,s));
    v.setInt16(44+i*2,s*16000,true);
  }
  const a=new Audio(URL.createObjectURL(new Blob([buf],{type:'audio/wav'})));
  a.play().catch(()=>{});
}

/* ── Breathing ─────────────────────────────────── */
function getPhases() {
  if(S.breathMode==='free') return [
    {name:'Inhale',duration:S.freeInhale,color:'var(--breathe-in)',scale:2.8},
    {name:'Exhale',duration:S.freeExhale,color:'var(--breathe-out)',scale:1},
  ];
  if(S.breathMode==='478') return [
    {name:'Inhale',duration:4,color:'var(--breathe-in)',scale:2.8},
    {name:'Hold',duration:7,color:'var(--breathe-hold)',scale:2.8},
    {name:'Exhale',duration:8,color:'var(--breathe-out)',scale:1},
  ];
  return [
    {name:'Inhale',duration:4,color:'var(--breathe-in)',scale:2.8},
    {name:'Hold',duration:4,color:'var(--breathe-hold)',scale:2.8},
    {name:'Exhale',duration:4,color:'var(--breathe-out)',scale:1},
    {name:'Hold',duration:4,color:'var(--breathe-hold)',scale:1},
  ];
}

let breathFrame=null, breathT0=0;

function getBreathState(el) {
  const ph=getPhases();
  const cyc=ph.reduce((s,p)=>s+p.duration,0);
  const pos=el%cyc;
  let cum=0;
  for(const p of ph){
    if(pos<cum+p.duration){
      const prog=(pos-cum)/p.duration;
      return {phase:p,progress:prog};
    }
    cum+=p.duration;
  }
  return {phase:ph[0],progress:0};
}

function animBreath() {
  if(!S.running||S.paused)return;
  const el=performance.now()/1000-breathT0;
  const {phase,progress}=getBreathState(el);
  const ci=document.getElementById('circleInner');
  const lb=document.getElementById('breathLabel');

  let sc;
  if(phase.name==='Inhale') sc=1+(2.8-1)*ease(progress);
  else if(phase.name==='Exhale') sc=2.8-(2.8-1)*ease(progress);
  else sc=phase.scale;

  ci.style.transform=`translate(-50%,-50%) scale(${sc})`;
  ci.style.background=`radial-gradient(circle,${phase.color} 0%,rgba(176,143,90,0.05) 100%)`;
  const rem=Math.ceil(phase.duration*(1-progress));
  lb.textContent=`${phase.name}\n${rem}`;
  breathFrame=requestAnimationFrame(animBreath);
}

function ease(t){return -(Math.cos(Math.PI*t)-1)/2;}

function startBreath(){
  breathT0=performance.now()/1000;
  document.getElementById('circleInner').classList.add('breathing');
  animBreath();
}

function stopBreath(){
  if(breathFrame)cancelAnimationFrame(breathFrame);
  breathFrame=null;
  const ci=document.getElementById('circleInner');
  ci.classList.remove('breathing');
  ci.style.transform='translate(-50%,-50%) scale(1)';
  ci.style.background='';
  document.getElementById('breathLabel').textContent='';
}

/* ── Timer ─────────────────────────────────────── */
let tickIv=null, bellsDone=new Set();

function fmt(s){const m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}

function activeEl(){
  if(!S.startTime)return 0;
  const now=Date.now();
  const pt=S.paused?(now-S.pauseStart):0;
  return Math.floor((now-S.startTime-S.pauseOffset-pt)/1000);
}

function tick(){
  if(!S.running||S.paused)return;
  const el=activeEl(); S.elapsed=el;
  const tot=S.duration*60;
  const rem=Math.max(0,tot-el);
  document.getElementById('timeRemaining').textContent=fmt(rem);
  document.getElementById('timeElapsed').textContent=fmt(el)+' elapsed';

  for(const[min,on]of Object.entries(S.bells)){
    const m=parseInt(min);
    if(on&&el>=m*60&&!bellsDone.has(m)){
      if(el-m*60<2){bellsDone.add(m);playBell('interval');}
      else bellsDone.add(m);
    }
  }
  if(rem<=0)complete();
}

function startTimer(){
  initAudio(); startSilentLoop();
  S.running=true;S.paused=false;S.startTime=Date.now();
  S.pauseOffset=0;S.pauseStart=null;S.elapsed=0;
  bellsDone.clear();
  document.body.classList.add('running');
  document.body.classList.remove('paused');
  playBell('interval');
  reqWake();
  tickIv=setInterval(tick,250);
  tick(); startBreath(); updBtn();
}

function pauseTimer(){
  S.paused=true;S.pauseStart=Date.now();
  document.body.classList.add('paused');
  if(breathFrame)cancelAnimationFrame(breathFrame);
  breathFrame=null; updBtn();
}

function resumeTimer(){
  S.pauseOffset+=Date.now()-S.pauseStart;
  S.paused=false;S.pauseStart=null;
  document.body.classList.remove('paused');
  breathT0=performance.now()/1000;
  animBreath(); updBtn();
}

function resetTimer(){
  S.running=false;S.paused=false;S.startTime=null;
  S.pauseOffset=0;S.pauseStart=null;S.elapsed=0;
  bellsDone.clear();
  if(tickIv)clearInterval(tickIv);tickIv=null;
  stopBreath();stopSilentLoop();relWake();
  document.body.classList.remove('running','paused');
  document.getElementById('timeRemaining').textContent=fmt(S.duration*60);
  document.getElementById('timeElapsed').textContent='';
  document.getElementById('resetHint').classList.remove('visible');
  updBtn();
}

function complete(){
  if(tickIv)clearInterval(tickIv);tickIv=null;
  playBell('end');
  const sess=JSON.parse(localStorage.getItem('med_sessions')||'[]');
  sess.push({date:new Date().toISOString(),duration:S.duration,elapsed:S.elapsed});
  localStorage.setItem('med_sessions',JSON.stringify(sess));
  setTimeout(()=>{
    if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
    stopBreath();stopSilentLoop();relWake();
    S.running=false;S.paused=false;
    document.body.classList.remove('running','paused');
    document.getElementById('timeRemaining').textContent='Done';
    document.getElementById('timeElapsed').textContent=fmt(S.elapsed)+' completed';
    updWeekly();updBtn();
    setTimeout(()=>{
      document.getElementById('timeRemaining').textContent=fmt(S.duration*60);
      document.getElementById('timeElapsed').textContent='';
    },5000);
  },500);
}

function updBtn(){
  const b=document.getElementById('btnStart');
  const h=document.getElementById('resetHint');
  if(!S.running){b.textContent='Begin';b.className='main-btn start';h.classList.remove('visible');}
  else if(S.paused){b.textContent='Resume';b.className='main-btn resume';h.classList.add('visible');}
  else{b.textContent='Pause';b.className='main-btn pause';h.classList.add('visible');}
}

/* ── Wake Lock ─────────────────────────────────── */
let wl=null;
async function reqWake(){if('wakeLock'in navigator){try{wl=await navigator.wakeLock.request('screen');}catch(e){}}}
function relWake(){if(wl){wl.release().catch(()=>{});wl=null;}}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.running&&!S.paused){
    reqWake();
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
  }
});

/* ── UI ────────────────────────────────────────── */
function updDur(d){
  S.duration=Math.max(5,Math.min(60,S.duration+d));
  document.getElementById('durVal').textContent=S.duration+' min';
  document.getElementById('timeRemaining').textContent=fmt(S.duration*60);
  savePref();renderBells();
}
document.getElementById('durUp').addEventListener('click',()=>updDur(5));
document.getElementById('durDown').addEventListener('click',()=>updDur(-5));

document.getElementById('breathModes').addEventListener('click',e=>{
  const b=e.target.closest('[data-mode]');if(!b)return;
  S.breathMode=b.dataset.mode;
  document.querySelectorAll('.breath-mode-btn').forEach(x=>x.classList.toggle('active',x.dataset.mode===S.breathMode));
  updBreathSteppers(); savePref();
});

document.getElementById('breathSteppers').addEventListener('click',e=>{
  const b=e.target.closest('[data-target]');if(!b)return;
  const tgt=b.dataset.target, dir=parseInt(b.dataset.dir);
  if(tgt==='inhale'){
    S.freeInhale=Math.max(2,Math.min(10,S.freeInhale+dir));
    document.getElementById('inhaleVal').textContent=S.freeInhale+'s';
  }else{
    S.freeExhale=Math.max(2,Math.min(10,S.freeExhale+dir));
    document.getElementById('exhaleVal').textContent=S.freeExhale+'s';
  }
  savePref();
});

function updBreathSteppers(){
  document.getElementById('breathSteppers').style.display=S.breathMode==='free'?'flex':'none';
}

const btnStart=document.getElementById('btnStart');
btnStart.addEventListener('click',()=>{
  if(!S.running)startTimer();
  else if(S.paused)resumeTimer();
  else pauseTimer();
});

let lpt=null;
btnStart.addEventListener('touchstart',()=>{
  if(!S.running)return;
  lpt=setTimeout(()=>{resetTimer();if(navigator.vibrate)navigator.vibrate(50);},800);
},{passive:true});
btnStart.addEventListener('touchend',()=>clearTimeout(lpt));
btnStart.addEventListener('touchcancel',()=>clearTimeout(lpt));
btnStart.addEventListener('mousedown',()=>{if(!S.running)return;lpt=setTimeout(()=>resetTimer(),800);});
btnStart.addEventListener('mouseup',()=>clearTimeout(lpt));
btnStart.addEventListener('mouseleave',()=>clearTimeout(lpt));

function renderBells(){
  const c=document.getElementById('bellToggles');c.innerHTML='';
  const marks=[];
  for(let m=5;m<S.duration;m+=5)marks.push(m);
  if(!marks.length){c.innerHTML='<div style="color:var(--text-dim);font-size:12px;padding:4px 0">Session too short for interval bells</div>';return;}
  marks.forEach(m=>{
    if(!(m in S.bells))S.bells[m]=true;
    const row=document.createElement('div');row.className='bell-row';
    row.innerHTML=`<span class="bell-label">${m} min</span><button class="toggle ${S.bells[m]?'on':''}" data-bell="${m}"></button>`;
    row.querySelector('.toggle').addEventListener('click',function(){
      S.bells[m]=!S.bells[m];this.classList.toggle('on',S.bells[m]);savePref();
    });
    c.appendChild(row);
  });
}

function updWeekly(){
  const sess=JSON.parse(localStorage.getItem('med_sessions')||'[]');
  const now=new Date(),sow=new Date(now);
  sow.setDate(now.getDate()-now.getDay());sow.setHours(0,0,0,0);
  const wm=sess.filter(s=>new Date(s.date)>=sow).reduce((sum,s)=>sum+(s.elapsed||s.duration*60),0);
  document.getElementById('weeklyVal').textContent=Math.round(wm/60)+' min';
}

function savePref(){
  localStorage.setItem('med_pref',JSON.stringify({
    duration:S.duration,breathMode:S.breathMode,
    freeInhale:S.freeInhale,freeExhale:S.freeExhale,
    bells:S.bells,
  }));
}

function loadPref(){
  try{
    const p=JSON.parse(localStorage.getItem('med_pref'));
    if(p){
      S.duration=p.duration||20;S.breathMode=p.breathMode||'free';
      S.freeInhale=p.freeInhale||4;S.freeExhale=p.freeExhale||4;
      if(p.bells)S.bells=p.bells;
    }
  }catch(e){}
}

/* ── Init ──────────────────────────────────────── */
loadPref();
document.getElementById('durVal').textContent=S.duration+' min';
document.getElementById('timeRemaining').textContent=fmt(S.duration*60);
document.getElementById('inhaleVal').textContent=S.freeInhale+'s';
document.getElementById('exhaleVal').textContent=S.freeExhale+'s';
document.querySelectorAll('.breath-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===S.breathMode));
updBreathSteppers();renderBells();updWeekly();
</script>
</body>
</html>
