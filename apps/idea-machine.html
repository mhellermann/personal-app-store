<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D1117">
<title>Idea Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0D1117;
  --surface: #161B22;
  --surface-hover: #1C2333;
  --border: #30363D;
  --border-focus: #58A6FF;
  --text: #E6EDF3;
  --text-muted: #7D8590;
  --text-dim: #484F58;
  --accent: #E8A838;
  --accent-dim: rgba(232,168,56,0.15);
  --danger: #E86B5A;
  --success: #4CAF82;
  --mono: 'DM Mono', 'SF Mono', monospace;
  --serif: 'Instrument Serif', Georgia, serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}

#app {
  height: 100%; display: flex; flex-direction: column;
  max-width: 640px; margin: 0 auto;
  padding-top: var(--safe-top);
}

/* ── Views ── */
.view { display: none; flex: 1; overflow-y: auto; padding: 20px 16px calc(20px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
.view.active { display: block; }

/* ── Typography ── */
h1, h2 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; }
h1 { font-size: 32px; }
h2 { font-size: 24px; }

/* ── Cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px;
}

/* ── Buttons ── */
.btn {
  font-family: var(--mono); font-size: 13px; border: none;
  cursor: pointer; border-radius: 6px; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: var(--bg); padding: 10px 20px; font-weight: 500; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-success { background: var(--success); color: var(--bg); padding: 10px 20px; font-weight: 500; }
.btn-ghost {
  background: transparent; color: var(--text-muted); padding: 8px 14px;
  border: 1px solid var(--border);
}
.btn-ghost:active { background: var(--surface); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-danger { color: var(--danger); }
.btn-back { background: none; border: none; color: var(--text-muted); font-family: var(--mono); font-size: 12px; cursor: pointer; padding: 4px 0; margin-bottom: 12px; }

/* ── Inputs ── */
textarea, input[type="text"] {
  width: 100%; font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; resize: vertical; transition: border-color 0.2s;
}
textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--border-focus); }
textarea::placeholder, input::placeholder { color: var(--text-dim); }

/* ── Category Grid ── */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-btn {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; cursor: pointer;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  transition: all 0.2s; text-align: left;
}
.cat-btn:active { transform: scale(0.97); }
.cat-btn .icon { font-size: 20px; flex-shrink: 0; }

/* ── Stats ── */
.stats { display: flex; gap: 10px; margin-bottom: 24px; }
.stat-card { flex: 1; text-align: center; padding: 12px 8px; }
.stat-val { font-size: 22px; font-family: var(--serif); font-weight: 400; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Prompt Display ── */
.prompt-display { border-left: 3px solid var(--accent); }
.prompt-text { font-size: 14px; line-height: 1.7; margin-bottom: 14px; }
.prompt-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Idea List ── */
.idea-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.idea-num {
  font-size: 12px; color: var(--text-dim); min-width: 22px;
  padding-top: 10px; text-align: right; font-variant-numeric: tabular-nums;
  transition: color 0.2s;
}
.idea-num.filled { color: var(--accent); }
.idea-row textarea { flex: 1; resize: none; overflow: hidden; padding: 8px 12px; }

/* ── Progress ── */
.progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; }
.progress-label { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

/* ── Prompt List ── */
.prompt-item { position: relative; }
.prompt-item-text { font-size: 13px; line-height: 1.6; padding-right: 80px; }
.prompt-item-date { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.prompt-item-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }

/* ── History ── */
details summary { list-style: none; cursor: pointer; }
details summary::-webkit-details-marker { display: none; }
.history-summary { display: flex; align-items: center; gap: 8px; }
.history-icon { font-size: 16px; flex-shrink: 0; }
.history-meta { font-size: 12px; color: var(--text-muted); }
.history-prompt-preview { font-size: 13px; margin-top: 2px; line-height: 1.4; }
.history-expand { color: var(--text-dim); font-size: 14px; margin-left: auto; flex-shrink: 0; }
.history-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.history-body ol { padding-left: 20px; }
.history-body li { font-size: 13px; line-height: 1.6; margin-bottom: 4px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-content {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; max-width: 560px; width: 100%;
  max-height: 80vh; overflow-y: auto; padding: 20px;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-header h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}

/* ── Label ── */
.section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-dim); margin-bottom: 10px;
}

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.35s ease-out both; }

/* ── API Key Warning ── */
.key-warning {
  background: rgba(232,107,90,0.1); border: 1px solid var(--danger);
  border-radius: 8px; padding: 12px; font-size: 12px; color: var(--danger);
  margin-bottom: 20px; line-height: 1.5;
}
.key-warning a { color: var(--danger); text-decoration: underline; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="app">
  <!-- Views are rendered by JS -->
</div>

<script>
/* ==============================================================
   IDEA MACHINE — Personal App Store Edition
   Uses Anthropic API key from localStorage (pas_anthropic_key)
   ============================================================== */

// ── Config ────────────────────────────────────────────────────
const STORAGE_PREFIX = 'idea_machine_';
const CATEGORIES = [
  { id: 'domain',        label: 'Domain Collision', icon: '⚡', color: '#E8A838' },
  { id: 'health',        label: 'Health',           icon: '🧬', color: '#4CAF82' },
  { id: 'wealth',        label: 'Wealth',           icon: '📈', color: '#5B8DEF' },
  { id: 'relationships', label: 'Relationships',    icon: '🤝', color: '#E86B5A' },
  { id: 'business',      label: 'Business',         icon: '🏗️', color: '#9B6EE7' },
];

const DOMAIN_CONTEXT = `You are generating ideation prompts for Michael, a semi-retired professional with a unique background:
- Systematic trend-following trader (built and ran quantitative trading systems)
- 20+ years in energy trading (natural gas, crude oil, power) at firms including Enron, Aquila, ATEL, EDF Trading, HETCO, eni T&S
- Dual German engineering degrees (Dipl.-Ing. & Dipl.-Wirt.-Ing., Mechanical Engineering, RWTH Aachen)
- Lives in Newport Beach, CA; dual US/German perspective
- AI power user (Claude, automation, PWAs)
- Practices Body by Science HIT training, Zen meditation, evidence-based health optimization
- Analytical, left-brained; engineering mindset favoring simplicity, robustness, and skepticism

His domain intersections are where the best ideas live: systematic trading × energy markets × German engineering rigor × AI fluency × health optimization × entrepreneurship.`;

const CATEGORY_SYSTEM = {
  domain: `${DOMAIN_CONTEXT}\n\nGenerate ONE sharp, specific ideation prompt that forces collision between two or more of Michael's domains. The prompt should be concrete enough to generate actionable business or product ideas — not vague philosophical questions. Reference specific knowledge or skills from his background. The prompt should make him think "I'm uniquely positioned to answer this."\n\nReturn ONLY the prompt text, no preamble, no quotes, no numbering.`,
  health: `${DOMAIN_CONTEXT}\n\nGenerate ONE specific ideation prompt about health, fitness, longevity, or wellness optimization — angled through Michael's analytical/engineering lens. Think: quantified self, training protocols, recovery science, meditation practice, sleep optimization, nutrition as a system. Leverage his HIT training experience, Oura ring data literacy, and systematic thinking. Be specific and actionable.\n\nReturn ONLY the prompt text, no preamble, no quotes, no numbering.`,
  wealth: `${DOMAIN_CONTEXT}\n\nGenerate ONE specific ideation prompt about wealth building, asset management, passive income, or financial optimization. Leverage Michael's deep knowledge of systematic trading, energy markets, risk management, and quantitative analysis. Think: alternative income streams, market inefficiencies, productized expertise, financial tools. Not generic "invest in index funds" territory.\n\nReturn ONLY the prompt text, no preamble, no quotes, no numbering.`,
  relationships: `${DOMAIN_CONTEXT}\n\nGenerate ONE specific ideation prompt about relationships, networking, community building, mentorship, or social capital. Consider Michael's dual US/German network, his energy industry connections, his AI community involvement, and his son at UC Irvine. Think: high-leverage relationship strategies, community creation, knowledge sharing, cross-cultural bridge-building.\n\nReturn ONLY the prompt text, no preamble, no quotes, no numbering.`,
  business: `${DOMAIN_CONTEXT}\n\nGenerate ONE specific, concrete business ideation prompt. This should push toward identifying a real opportunity — a product, service, platform, or consultancy — that exploits Michael's unique combination of skills. Think Thiel-style: what do you know that others don't? What's a secret hidden in plain sight in energy trading, systematic risk management, or AI-augmented decision making? Be provocative and specific.\n\nReturn ONLY the prompt text, no preamble, no quotes, no numbering.`,
};

// ── State ─────────────────────────────────────────────────────
let state = {
  view: 'home',
  sessions: [],
  streak: 0,
  totalSessions: 0,
  customPrompts: [],
  currentSession: null,
  ideas: Array(10).fill(''),
  activePrompt: '',
  activeCategory: null,
  isGenerating: false,
  genError: null,
  showPromptPicker: false,
  editingPromptId: null,
  editingPromptText: '',
  newPromptText: '',
};

// ── Persistence (localStorage) ────────────────────────────────
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'data') || '{}');
    state.sessions = d.sessions || [];
    state.streak = d.streak || 0;
    state.totalSessions = d.totalSessions || 0;
  } catch {}
  try {
    state.customPrompts = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'prompts') || '[]');
  } catch {}
}

function saveData() {
  localStorage.setItem(STORAGE_PREFIX + 'data', JSON.stringify({
    sessions: state.sessions,
    streak: state.streak,
    totalSessions: state.totalSessions,
  }));
}

function savePrompts() {
  localStorage.setItem(STORAGE_PREFIX + 'prompts', JSON.stringify(state.customPrompts));
}

// ── API Key ───────────────────────────────────────────────────
function getApiKey() {
  return localStorage.getItem('pas_anthropic_key') || '';
}

// ── API Call ───────────────────────────────────────────────────
async function generatePrompt(categoryId) {
  const apiKey = getApiKey();
  if (!apiKey) {
    state.genError = 'No API key found. Configure it in your App Store settings.';
    state.isGenerating = false;
    render();
    return;
  }
  state.isGenerating = true;
  state.genError = null;
  render();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: CATEGORY_SYSTEM[categoryId] }],
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API returned ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text?.trim();
    if (text) {
      state.activePrompt = text;
      state.activeCategory = categoryId;
    } else {
      state.genError = 'No prompt returned. Try again.';
    }
  } catch (err) {
    state.genError = err.message || 'API error — check connection.';
  }

  state.isGenerating = false;
  render();
}

// ── Session Logic ─────────────────────────────────────────────
function startSession(prompt, category) {
  state.currentSession = {
    id: Date.now().toString(),
    date: new Date().toISOString(),
    prompt,
    category,
  };
  state.ideas = Array(10).fill('');
  state.activePrompt = prompt;
  state.view = 'session';
  render();
  // Focus first textarea
  setTimeout(() => {
    const first = document.querySelector('.idea-row textarea');
    if (first) first.focus();
  }, 100);
}

function saveSession() {
  const filled = state.ideas.filter(i => i.trim()).length;
  if (filled === 0) return;

  const session = { ...state.currentSession, ideas: [...state.ideas], filledCount: filled };
  state.sessions.unshift(session);

  // Streak logic
  const today = new Date().toDateString();
  const lastDate = state.sessions[1]?.date ? new Date(state.sessions[1].date).toDateString() : null;
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  if (lastDate === today) {
    // already logged today
  } else if (lastDate === yesterday) {
    state.streak++;
  } else {
    state.streak = 1;
  }
  state.totalSessions++;

  saveData();
  state.currentSession = null;
  state.view = 'home';
  render();
}

// ── Custom Prompts ────────────────────────────────────────────
function addCustomPrompt() {
  const text = state.newPromptText.trim();
  if (!text) return;
  state.customPrompts.unshift({
    id: Date.now().toString(),
    text,
    createdAt: new Date().toISOString(),
  });
  state.newPromptText = '';
  savePrompts();
  render();
}

function deletePrompt(id) {
  state.customPrompts = state.customPrompts.filter(p => p.id !== id);
  savePrompts();
  render();
}

function saveEditedPrompt(id) {
  const text = state.editingPromptText.trim();
  if (!text) return;
  state.customPrompts = state.customPrompts.map(p =>
    p.id === id ? { ...p, text } : p
  );
  state.editingPromptId = null;
  state.editingPromptText = '';
  savePrompts();
  render();
}

// ── Helpers ───────────────────────────────────────────────────
function getCat(id) { return CATEGORIES.find(c => c.id === id) || { icon: '📝', label: 'Custom', color: '#8B9DAF' }; }
function filledCount() { return state.ideas.filter(i => i.trim()).length; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const views = {
    home: renderHome,
    session: renderSession,
    prompts: renderPrompts,
    history: renderHistory,
  };
  app.innerHTML = `<div class="view active">${(views[state.view] || renderHome)()}</div>`;
  bindEvents();
}

function renderHome() {
  const hasKey = !!getApiKey();
  const cat = state.activeCategory ? getCat(state.activeCategory) : null;

  return `
    ${!hasKey ? `<div class="key-warning fade-up">
      No Anthropic API key found. Go to your <a href="../" onclick="return false">App Store</a> settings (gear icon) and enter your key.
    </div>` : ''}

    <div class="fade-up" style="margin-bottom:28px">
      <h1>Idea Machine</h1>
      <p style="color:var(--text-muted);font-size:13px;margin-top:6px">
        API-powered prompts × your domain intersections
      </p>
    </div>

    <div class="stats fade-up">
      ${[
        { label: 'Streak', value: state.streak + 'd', color: 'var(--accent)' },
        { label: 'Sessions', value: state.totalSessions, color: 'var(--text)' },
        { label: 'Custom', value: state.customPrompts.length, color: 'var(--text-muted)' },
      ].map(s => `
        <div class="card stat-card">
          <div class="stat-val" style="color:${s.color}">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="fade-up" style="margin-bottom:10px">
      <div class="section-label">Generate a prompt</div>
      <div class="cat-grid">
        ${CATEGORIES.map(c => `
          <button class="cat-btn" data-gen="${c.id}" ${state.isGenerating ? 'disabled' : ''}
            style="opacity:${state.isGenerating ? 0.5 : 1};
              ${state.activeCategory === c.id ? `border-color:${c.color};background:${c.color}11` : ''}">
            <span class="icon">${c.icon}</span>
            <span>${c.label}</span>
          </button>
        `).join('')}
      </div>
    </div>

    <div class="fade-up" style="margin-bottom:20px">
      <button class="cat-btn" data-action="pick-custom" style="width:100%">
        <span class="icon">✍️</span>
        <span>Use Custom Prompt</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text-dim)">${state.customPrompts.length} saved</span>
      </button>
    </div>

    ${state.isGenerating ? `
      <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">
        <div class="spinner" style="margin-bottom:8px"></div>
        <div>Generating prompt...</div>
      </div>
    ` : ''}

    ${state.genError ? `
      <div class="card fade-up" style="border-color:var(--danger);color:var(--danger);font-size:12px;margin-bottom:16px">
        ${esc(state.genError)}
      </div>
    ` : ''}

    ${state.activePrompt && !state.isGenerating ? `
      <div class="fade-up" style="margin-bottom:20px">
        <div class="section-label">Your prompt</div>
        <div class="card prompt-display" style="border-left-color:${cat?.color || 'var(--accent)'}">
          <p class="prompt-text">${esc(state.activePrompt)}</p>
          <div class="prompt-actions">
            <button class="btn btn-primary" data-action="start">Start →</button>
            ${state.activeCategory !== 'custom' ? `<button class="btn btn-ghost" data-action="reroll">↻ Reroll</button>` : ''}
          </div>
        </div>
      </div>
    ` : ''}

    <div class="fade-up" style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" data-nav="prompts">Manage Prompts</button>
      <button class="btn btn-ghost" style="flex:1" data-nav="history">History (${state.sessions.length})</button>
    </div>

    ${state.showPromptPicker ? renderPromptPicker() : ''}
  `;
}

function renderPromptPicker() {
  return `
    <div class="modal-overlay" data-action="close-picker">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3>Custom Prompts</h3>
          <button class="btn btn-ghost btn-sm" data-action="close-picker">✕</button>
        </div>
        ${state.customPrompts.length === 0 ? `
          <p style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0">
            No custom prompts yet — add some in Manage Prompts
          </p>
        ` : `
          <div style="display:flex;flex-direction:column;gap:8px">
            ${state.customPrompts.map(p => `
              <button class="card" data-use-prompt="${esc(p.id)}"
                style="cursor:pointer;text-align:left;font-size:13px;line-height:1.5;font-family:var(--mono)">
                ${esc(p.text)}
              </button>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function renderSession() {
  const filled = filledCount();
  const cat = getCat(state.activeCategory);

  return `
    <button class="btn-back" data-nav="home">← Back</button>

    <div class="card prompt-display fade-up" style="border-left-color:${cat.color};margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${cat.label}</div>
      <p style="font-size:14px;line-height:1.7">${esc(state.activePrompt)}</p>
    </div>

    <div class="fade-up" style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${(filled/10)*100}%;background:${filled===10?'var(--success)':'var(--accent)'}"></div>
      </div>
      <span class="progress-label" style="color:${filled===10?'var(--success)':'var(--text-muted)'}">${filled}/10</span>
    </div>

    <div>
      ${state.ideas.map((idea, i) => `
        <div class="idea-row">
          <span class="idea-num ${idea.trim() ? 'filled' : ''}">${i+1}</span>
          <textarea data-idea="${i}" rows="1"
            placeholder="${i===0?'Your first idea...':i===9?'The hard one — dig deep':'Idea '+(i+1)}">${esc(idea)}</textarea>
        </div>
      `).join('')}
    </div>

    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn ${filled===10?'btn-success':'btn-primary'}" style="flex:1" data-action="save" ${filled===0?'disabled':''}>
        ${filled===10 ? '✓ Save Complete Session' : `Save (${filled}/10)`}
      </button>
    </div>
  `;
}

function renderPrompts() {
  return `
    <button class="btn-back" data-nav="home">← Back</button>

    <div class="fade-up" style="margin-bottom:20px">
      <h2>Custom Prompts</h2>
      <p style="color:var(--text-muted);font-size:12px;margin-top:6px">
        Capture prompts as they come to you. Use them anytime.
      </p>
    </div>

    <div class="fade-up" style="margin-bottom:24px">
      <textarea id="new-prompt-input" rows="3" placeholder="Enter a new ideation prompt..."
        style="margin-bottom:8px">${esc(state.newPromptText)}</textarea>
      <button class="btn btn-primary" data-action="add-prompt" ${!state.newPromptText.trim()?'disabled':''}>
        + Add Prompt
      </button>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      ${state.customPrompts.length === 0 ? `
        <p style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">No custom prompts yet</p>
      ` : ''}
      ${state.customPrompts.map(p => `
        <div class="card prompt-item fade-up">
          ${state.editingPromptId === p.id ? `
            <textarea id="edit-prompt-input" rows="3"
              style="margin-bottom:8px;background:var(--bg);border-color:var(--border-focus)">${esc(state.editingPromptText)}</textarea>
            <div style="display:flex;gap:6px">
              <button class="btn btn-primary btn-sm" data-action="save-edit" data-id="${p.id}">Save</button>
              <button class="btn btn-ghost btn-sm" data-action="cancel-edit">Cancel</button>
            </div>
          ` : `
            <p class="prompt-item-text">${esc(p.text)}</p>
            <div class="prompt-item-date">${new Date(p.createdAt).toLocaleDateString()}</div>
            <div class="prompt-item-actions">
              <button class="btn btn-ghost btn-sm" data-action="use-prompt-direct" data-id="${p.id}" title="Use">▶</button>
              <button class="btn btn-ghost btn-sm" data-action="edit-prompt" data-id="${p.id}" title="Edit">✎</button>
              <button class="btn btn-ghost btn-sm btn-danger" data-action="delete-prompt" data-id="${p.id}" title="Delete">✕</button>
            </div>
          `}
        </div>
      `).join('')}
    </div>
  `;
}

function renderHistory() {
  return `
    <button class="btn-back" data-nav="home">← Back</button>

    <div class="fade-up" style="margin-bottom:20px">
      <h2>History</h2>
    </div>

    ${state.sessions.length === 0 ? `
      <p style="color:var(--text-dim);font-size:13px;text-align:center;padding:40px">
        No sessions yet — start your first one
      </p>
    ` : `
      <div style="display:flex;flex-direction:column;gap:10px">
        ${state.sessions.map(s => {
          const cat = getCat(s.category);
          const count = s.filledCount || s.ideas.filter(x => x.trim()).length;
          return `
            <details class="card fade-up">
              <summary class="history-summary">
                <span class="history-icon">${cat.icon}</span>
                <div style="flex:1;min-width:0">
                  <div class="history-meta">${new Date(s.date).toLocaleDateString()} · ${count}/10</div>
                  <div class="history-prompt-preview">${esc(s.prompt.slice(0,80))}${s.prompt.length>80?'…':''}</div>
                </div>
                <span class="history-expand">▸</span>
              </summary>
              <div class="history-body">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${esc(s.prompt)}</div>
                <ol>
                  ${s.ideas.filter(x=>x.trim()).map(idea => `<li>${esc(idea)}</li>`).join('')}
                </ol>
              </div>
            </details>
          `;
        }).join('')}
      </div>
    `}
  `;
}

// ── Event Binding ─────────────────────────────────────────────
function bindEvents() {
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      state.view = el.dataset.nav;
      render();
    });
  });

  // Generate prompt
  document.querySelectorAll('[data-gen]').forEach(el => {
    el.addEventListener('click', () => generatePrompt(el.dataset.gen));
  });

  // Actions
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      const action = el.dataset.action;

      if (action === 'start') startSession(state.activePrompt, state.activeCategory);
      else if (action === 'reroll' && state.activeCategory) generatePrompt(state.activeCategory);
      else if (action === 'save') saveSession();
      else if (action === 'pick-custom') { state.showPromptPicker = true; render(); }
      else if (action === 'close-picker') { state.showPromptPicker = false; render(); }
      else if (action === 'add-prompt') addCustomPrompt();
      else if (action === 'save-edit') saveEditedPrompt(el.dataset.id);
      else if (action === 'cancel-edit') { state.editingPromptId = null; render(); }
      else if (action === 'edit-prompt') {
        const p = state.customPrompts.find(p => p.id === el.dataset.id);
        if (p) { state.editingPromptId = p.id; state.editingPromptText = p.text; render(); }
      }
      else if (action === 'delete-prompt') deletePrompt(el.dataset.id);
      else if (action === 'use-prompt-direct') {
        const p = state.customPrompts.find(p => p.id === el.dataset.id);
        if (p) { state.activePrompt = p.text; state.activeCategory = 'custom'; state.view = 'home'; render(); }
      }
    });
  });

  // Use custom prompt from picker
  document.querySelectorAll('[data-use-prompt]').forEach(el => {
    el.addEventListener('click', () => {
      const p = state.customPrompts.find(p => p.id === el.dataset.usePrompt);
      if (p) {
        state.activePrompt = p.text;
        state.activeCategory = 'custom';
        state.showPromptPicker = false;
        render();
      }
    });
  });

  // Idea textareas
  document.querySelectorAll('[data-idea]').forEach(el => {
    const idx = parseInt(el.dataset.idea);

    // Auto-resize
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';

    el.addEventListener('input', () => {
      state.ideas[idx] = el.value;
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      // Update progress + save button without full re-render
      const filled = filledCount();
      const bar = document.querySelector('.progress-fill');
      const label = document.querySelector('.progress-label');
      const num = el.closest('.idea-row').querySelector('.idea-num');
      if (bar) { bar.style.width = (filled/10)*100+'%'; bar.style.background = filled===10?'var(--success)':'var(--accent)'; }
      if (label) { label.textContent = filled+'/10'; label.style.color = filled===10?'var(--success)':'var(--text-muted)'; }
      if (num) { num.className = 'idea-num' + (el.value.trim() ? ' filled' : ''); }
      const saveBtn = document.querySelector('[data-action="save"]');
      if (saveBtn) {
        saveBtn.disabled = filled === 0;
        saveBtn.className = 'btn ' + (filled===10?'btn-success':'btn-primary');
        saveBtn.style.flex = '1';
        saveBtn.textContent = filled===10 ? '✓ Save Complete Session' : `Save (${filled}/10)`;
      }
    });

    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && idx < 9) {
        e.preventDefault();
        const next = document.querySelector(`[data-idea="${idx+1}"]`);
        if (next) next.focus();
      }
    });
  });

  // New prompt input
  const newInput = document.getElementById('new-prompt-input');
  if (newInput) {
    newInput.addEventListener('input', () => {
      state.newPromptText = newInput.value;
      const btn = document.querySelector('[data-action="add-prompt"]');
      if (btn) btn.disabled = !newInput.value.trim();
    });
  }

  // Edit prompt input
  const editInput = document.getElementById('edit-prompt-input');
  if (editInput) {
    editInput.addEventListener('input', () => {
      state.editingPromptText = editInput.value;
    });
  }
}

// ── Init ──────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
