<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Personal App Store</title>

  <!-- PWA: behaves like a native app when added to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="App Store">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="description" content="Michael's personal app collection">

  <!-- Apple touch icon: inline SVG, no separate file needed -->
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0a0c'/><text x='90' y='118' font-family='Georgia,serif' font-size='90' font-style='italic' fill='%23d4a574' text-anchor='middle'>M</text></svg>">

  <!-- Typography: editorial serif + modern grotesque -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0c;
      --bg-elev: #131316;
      --paper: #f5f1e8;
      --paper-dim: #b8b2a4;
      --paper-faint: #6b665b;
      --rule: #1f1f23;
      --accent: #d4a574;
      --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
      --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--paper);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* Subtle grain overlay for paper-like texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.035;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 32px) 24px max(env(safe-area-inset-bottom), 48px);
    }

    /* HEADER */
    header {
      padding-top: 24px;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 40px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper-faint);
      font-weight: 500;
      margin-bottom: 36px;
    }

    .meta-row .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
      box-shadow: 0 0 8px var(--accent);
    }

    .greeting {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(36px, 8vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--paper);
      margin-bottom: 12px;
    }

    .greeting em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .subtitle {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--paper-dim);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* SECTION HEADING */
    .section-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .section-label h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-style: italic;
      font-size: 22px;
      color: var(--paper);
      letter-spacing: -0.01em;
    }

    .section-label .count {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper-faint);
      font-weight: 500;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (min-width: 540px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    /* TILE */
    .tile {
      position: relative;
      aspect-ratio: 1 / 1.15;
      border-radius: 22px;
      overflow: hidden;
      background: var(--bg-elev);
      border: 1px solid var(--rule);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px 18px 16px;
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.25s ease;
      isolation: isolate;
    }

    .tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--tile-gradient);
      opacity: 0.85;
      z-index: -2;
    }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 100%);
      z-index: -1;
    }

    .tile:hover, .tile:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(212, 165, 116, 0.4);
    }

    .tile:active { transform: translateY(0) scale(0.98); }

    .tile .monogram {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      font-size: 56px;
      line-height: 1;
      color: var(--paper);
      opacity: 0.92;
      letter-spacing: -0.04em;
      text-shadow: 0 2px 18px rgba(0,0,0,0.4);
    }

    .tile .label {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tile .name {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.005em;
      color: var(--paper);
    }

    .tile .desc {
      font-family: var(--sans);
      font-size: 11px;
      color: rgba(245, 241, 232, 0.65);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .tile .category {
      position: absolute;
      top: 16px;
      right: 16px;
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(245, 241, 232, 0.55);
      font-weight: 500;
    }

    /* ADD TILE */
    .tile.add {
      background: transparent;
      border: 1px dashed var(--rule);
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--paper-faint);
    }

    .tile.add::before, .tile.add::after { display: none; }

    .tile.add:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tile.add .plus {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 48px;
      line-height: 1;
    }

    .tile.add .add-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 8px;
      font-weight: 500;
    }

    /* FOOTER */
    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--paper-faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }

    footer em {
      font-family: var(--serif);
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-size: 13px;
      color: var(--paper-dim);
      font-weight: 400;
    }

    /* Stagger entrance */
    .tile, .greeting, .subtitle, .section-label, .meta-row {
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .meta-row { animation-delay: 0.05s; }
    .greeting { animation-delay: 0.15s; }
    .subtitle { animation-delay: 0.25s; }
    .section-label { animation-delay: 0.4s; }
    .grid .tile:nth-child(1) { animation-delay: 0.5s; }
    .grid .tile:nth-child(2) { animation-delay: 0.58s; }
    .grid .tile:nth-child(3) { animation-delay: 0.66s; }
    .grid .tile:nth-child(4) { animation-delay: 0.74s; }
    .grid .tile:nth-child(5) { animation-delay: 0.82s; }
    .grid .tile:nth-child(6) { animation-delay: 0.9s; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="meta-row">
        <span><span class="dot"></span><span id="date-line">—</span></span>
        <span>Newport Beach</span>
      </div>
      <h1 class="greeting" id="greeting">Good <em>evening</em>, Michael.</h1>
      <p class="subtitle">Your personal app store. A curated shelf of tools, custom-built.</p>
    </header>

    <section>
      <div class="section-label">
        <h2>Library</h2>
        <span class="count" id="app-count">0 apps</span>
      </div>
      <div class="grid" id="grid"></div>
    </section>

    <footer>
      <span>Built locally · No App Store</span>
      <em>v1.0</em>
    </footer>
  </div>

  <script>
    /* ==========================================================
       EDIT THIS ARRAY TO ADD / REMOVE / RENAME APPS
       Each app needs: name, desc, url, monogram, category, gradient
       Replace REPLACE_WITH_YOUR_URL with the actual deployed URL.
       ========================================================== */
    const APPS = [
      {
        name: "Idea Machine",
        desc: "Daily 10 ideas",
        url: "apps/idea-machine.html",
        monogram: "I",
        category: "Creative",
        gradient: "linear-gradient(135deg, #3a2a1a 0%, #6b4423 60%, #8a5a2b 100%)"
      },
      {
        name: "HIT Tracker",
        desc: "Body by Science",
        url: "apps/hit-tracker.html",
        monogram: "H",
        category: "Health",
        gradient: "linear-gradient(135deg, #1a2820 0%, #2d4a35 60%, #4a6b50 100%)"
      },
      {
        name: "Meditation Timer",
        desc: "Sit, breathe, be still",
        url: "https://mhellermann.github.io/personal-app-store/apps/meditation-timer.html",
        monogram: "M",
        category: "Wellness",
        gradient: "linear-gradient(135deg, #0f1a1a 0%, #1e3a35 60%, #2d5a4a 100%)"
      },
      // Add more apps here as you build them. Examples:
      // {
      //   name: "Trade Journal",
      //   desc: "Futures log",
      //   url: "https://...",
      //   monogram: "T",
      //   category: "Trading",
      //   gradient: "linear-gradient(135deg, #1a1f2e 0%, #2a3a55 60%, #3d5278 100%)"
      // },
    ];

    /* -------- RENDER -------- */
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('app-count');

    APPS.forEach(app => {
      const a = document.createElement('a');
      a.className = 'tile';
      a.href = app.url;
      a.style.setProperty('--tile-gradient', app.gradient);
      a.target = '_self';
      a.innerHTML = `
        <span class="category">${app.category}</span>
        <span class="monogram">${app.monogram}</span>
        <span class="label">
          <span class="name">${app.name}</span>
          <span class="desc">${app.desc}</span>
        </span>
      `;
      grid.appendChild(a);
    });

    // "Add new" tile (placeholder for phase 2 — ask Claude to build a new app)
    const addTile = document.createElement('div');
    addTile.className = 'tile add';
    addTile.innerHTML = `<span class="plus">+</span><span class="add-label">New App</span>`;
    addTile.addEventListener('click', () => {
      alert('Phase 2: this will prompt Claude to build a new app and add it to the library. For now, edit the APPS array in this file and redeploy.');
    });
    grid.appendChild(addTile);

    countEl.textContent = APPS.length === 1 ? '1 app' : `${APPS.length} apps`;

    /* -------- DATE & GREETING -------- */
    const now = new Date();
    const hour = now.getHours();
    let timeOfDay = 'evening';
    if (hour < 5) timeOfDay = 'night';
    else if (hour < 12) timeOfDay = 'morning';
    else if (hour < 18) timeOfDay = 'afternoon';
    else if (hour < 22) timeOfDay = 'evening';
    else timeOfDay = 'night';

    document.getElementById('greeting').innerHTML = `Good <em>${timeOfDay}</em>, Michael.`;

    const dateOpts = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date-line').textContent = now.toLocaleDateString('en-US', dateOpts);
  </script>
</body>
</html>
